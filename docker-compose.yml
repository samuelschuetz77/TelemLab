services:
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    ports:
      - "8080:8080"
    volumes:
      - ./Qwen3.5-2B-Q8_0.gguf:/models/Qwen3.5-2B-Q8_0.gguf:ro
      - ./models:/models
    environment:
      LLAMA_ARG_MODEL: /models/Qwen3.5-2B-Q8_0.gguf
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.5-3.4.0-ubuntu22.04
    container_name: dcgm-exporter
    runtime: nvidia
    ports:
      - "9400:9400"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    cap_add:
      - SYS_ADMIN 
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"  # Maps internal 8080 to host 3000
    volumes:
      - open-webui:/app/backend/data
    environment:
      - 'OPENAI_API_BASE_URL=http://llama-cpp:8080/v1'
      - 'OPENAI_API_KEY=sk-1234' # Placeholder
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000" # Using 3001 since you might use 3000 for OpenWebUI
    restart: unless-stopped

volumes:
  open-webui:
