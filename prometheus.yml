global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'nvidia_exporter'
    static_configs:
      - targets:
          - '192.168.1.10:9400'
          - '192.168.1.11:9400'
          - '192.168.1.12:9400'
          - 'localhost:9400'  # include the central machine if it also runs the exporter

  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'localhost:9090'

# Replace the target list above with the actual IP addresses of every student machine
# running docker-compose with the nvidia-exporter service.
